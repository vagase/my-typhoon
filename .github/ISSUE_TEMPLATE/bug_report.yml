name: Bug 报告
description: 报告可复现的功能、数据或界面问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请勿提交精确位置、API 密钥、访问令牌或未公开的安全漏洞。安全问题请使用 GitHub Security Advisory。
  - type: input
    id: version
    attributes:
      label: TyphoonBar 版本或提交
      placeholder: 例如 1.2 / edbe280
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS 版本和设备架构
      placeholder: 例如 macOS 15.5 / Apple Silicon
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？你原本期望什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开…
        2. 选择…
        3. 看到…
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先删除位置、账号、令牌等敏感信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我确认这不是官方预警纠错请求，也不会只依赖本应用做安全决策。
          required: true
        - label: 我已删除报告中的精确位置和其他敏感信息。
          required: true
