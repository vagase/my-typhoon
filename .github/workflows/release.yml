name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v5

      - name: Validate version tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

      - name: Apply release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          version="${RELEASE_TAG#v}"
          marketing_version="${version%%-*}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $marketing_version" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Build application
        run: ./build_app.sh

      - name: Verify application signature
        run: codesign --verify --deep --strict --verbose=2 dist/TyphoonBar.app

      - name: Create distribution archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/TyphoonBar.app TyphoonBar-macOS.zip
          shasum -a 256 TyphoonBar-macOS.zip > TyphoonBar-macOS.zip.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          args=(
            "$RELEASE_TAG"
            "TyphoonBar-macOS.zip"
            "TyphoonBar-macOS.zip.sha256"
            --verify-tag
            --generate-notes
            --title "TyphoonBar $RELEASE_TAG"
          )
          if [[ "$RELEASE_TAG" == *-* ]]; then
            args+=(--prerelease --latest=false)
          else
            args+=(--latest)
          fi
          gh release create "${args[@]}"
